# Render deployment for the EchoVault API (Express + Gemini)
services:
  - type: web
    name: echovault-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      # Set ANY ONE of these free AI keys (or none → offline EchoBrain fallback)
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
